<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Noovel">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Noovel</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div id="theme-deco" aria-hidden="true"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>
<div id="app">

  <header id="header">
    <button id="btn-left" data-mode="open">開く</button>
    <h1 id="header-title">Noovel</h1>
    <button id="btn-settings" aria-label="設定">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <div id="progress"><div id="progress-bar"></div></div>

  <div id="reader-wrap">
    <div id="shelf">
      <div id="tag-chips"></div>
      <div id="sort-row">
        <button id="series-btn" aria-label="シリーズ一覧">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <rect x="3" y="3" width="5.5" height="5.5" rx="1"/><rect x="11.5" y="3" width="5.5" height="5.5" rx="1"/>
            <rect x="3" y="11.5" width="5.5" height="5.5" rx="1"/><rect x="11.5" y="11.5" width="5.5" height="5.5" rx="1"/>
          </svg>
        </button>
        <button id="sort-btn" aria-label="並び替え">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
               stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
            <path d="M3 5h10"/><path d="M3 10h7"/><path d="M3 15h4"/>
            <path d="M15 7v9"/><path d="M12.5 13.5 15 16l2.5-2.5"/>
          </svg>
        </button>
      </div>
      <button id="resume-bar" class="hidden"></button>
      <div id="shelf-empty">
        <p>📖</p>
        <p>「開く」からテキストファイルを<br>読み込んでください</p>
      </div>
      <div id="shelf-list"></div>
      <button id="btn-paste-open">＋ 貼り付けで追加</button>
      <div id="shelf-version" class="version-note"></div>
    </div>
    <div id="reader"></div>
    <div id="press-menu" class="hidden">
      <button id="pm-marker">マーカー</button>
      <button id="pm-bookmark">しおり</button>
    </div>
  </div>

  <div id="chapter-nav" class="hidden">
    <div id="seek-preview" class="hidden">
      <div id="seek-preview-ch"></div>
      <div id="seek-preview-pct"></div>
    </div>
    <div id="seek-row">
      <input type="range" id="seek-bar" min="0" max="1000" value="0" aria-label="読書位置（本全体）">
      <span id="seek-pct">0%</span>
    </div>
    <div id="ch-nav-row">
      <button id="btn-prev-ch" disabled>‹</button>
      <button id="chapter-nav-info" aria-label="目次を開く">
        <div id="ch-title-nav"></div>
        <div id="ch-counter"></div>
      </button>
      <button id="btn-next-ch" disabled>›</button>
    </div>
  </div>

</div>

<!-- 設定パネル -->
<div id="settings-panel" class="hidden">
  <div id="settings-inner">
    <strong>表示設定</strong>

    <div>
      <div class="panel-label">テーマ</div>
      <div class="themes"><!-- ボタンは app.js が THEMES から生成 --></div>
    </div>

    <div class="setting-row">
      <label>文字サイズ <span id="val-font-size">18</span>px</label>
      <input type="range" id="range-font-size" min="12" max="32" step="1" value="18">
    </div>

    <div class="setting-row">
      <label>行間 <span id="val-line-height">2.0</span></label>
      <input type="range" id="range-line-height" min="1.2" max="3.0" step="0.1" value="2.0">
    </div>

    <div class="setting-row">
      <label>フォント</label>
      <select id="sel-font">
        <option value="serif">明朝体</option>
        <option value="gothic">ゴシック体</option>
        <option value="rounded">丸ゴシック</option>
      </select>
    </div>

    <div class="setting-row">
      <label>背景色</label>
      <input type="color" id="pick-bg" value="#f5f0e8">
    </div>
    <div class="setting-row">
      <label>文字色</label>
      <input type="color" id="pick-text" value="#333333">
    </div>

    <div class="toggle-row">
      <label>縦書き</label>
      <label class="switch">
        <input type="checkbox" id="tog-vertical">
        <span class="slider"></span>
      </label>
    </div>

    <div>
      <div class="panel-label">データ</div>
      <div class="backup-row">
        <button id="btn-backup-export">本棚を書き出す</button>
        <button id="btn-backup-import">バックアップを読み込む</button>
      </div>
      <div class="backup-note">書き出したファイルは「ファイル」appに保存されます。月イチ推奨</div>
    </div>

    <button id="btn-close-settings">閉じる</button>
    <div id="app-version" class="version-note"></div>
  </div>
</div>

<!-- 目次パネル -->
<div id="toc-panel" class="hidden">
  <div id="toc-inner">
    <div id="toc-header">
      <strong id="toc-book-title"></strong>
      <button id="btn-close-toc">✕</button>
    </div>
    <div id="toc-tabs">
      <button class="toc-tab active" data-tab="toc">目次</button>
      <button class="toc-tab" data-tab="bm">しおり</button>
      <button class="toc-tab" data-tab="mk">マーカー</button>
    </div>
    <div id="toc-list"></div>
    <button id="btn-to-shelf">‹ 本棚へ戻る</button>
  </div>
</div>

<!-- 本の編集シート（タグ｜情報） -->
<div id="tag-panel" class="hidden">
  <div id="tag-inner">
    <strong>本の編集</strong>
    <div id="edit-tabs">
      <button class="edit-tab active" data-tab="tags">タグ</button>
      <button class="edit-tab" data-tab="info">情報</button>
    </div>
    <div id="tag-list"></div>
    <div id="edit-info" class="hidden">
      <label class="edit-field">タイトル
        <input type="text" id="edit-title">
      </label>
      <label class="edit-field">著者
        <input type="text" id="edit-author" placeholder="著者名（任意）">
      </label>
      <label class="edit-field">シリーズ名
        <input type="text" id="edit-series" placeholder="シリーズ名（任意）">
      </label>
      <label class="edit-field">話数
        <input type="text" id="edit-episode" inputmode="numeric" placeholder="シリーズ内の順番（数字）">
      </label>
      <p class="edit-hint">入力欄の外をタップした時点で保存されます。タイトルを空にした場合は変更されません</p>
    </div>
    <button id="btn-tag-close">閉じる</button>
  </div>
</div>

<!-- 選択モードの下部バー -->
<div id="select-actbar" class="hidden">
  <button id="btn-make-series" disabled>シリーズにまとめる</button>
</div>

<!-- シリーズにまとめるシート -->
<div id="series-panel" class="hidden">
  <div id="series-inner">
    <strong>シリーズにまとめる</strong>
    <label class="edit-field">シリーズ名（タップで編集できます）
      <input type="text" id="series-name" placeholder="シリーズ名を入力">
    </label>
    <div>
      <div class="panel-label">読む順（タイトルの数字から自動判定）</div>
      <div id="series-order"></div>
      <p class="edit-hint">順番がズレていたら、あとで各本の「情報」タブの話数で直せます</p>
    </div>
    <div class="series-actions">
      <button id="btn-series-cancel">やめる</button>
      <button id="btn-series-ok">まとめる</button>
    </div>
  </div>
</div>

<!-- シリーズ編集シート（シリーズ内画面の ⋯ から） -->
<div id="series-edit-panel" class="hidden">
  <div id="series-edit-inner">
    <strong id="series-edit-title"></strong>
    <button class="series-edit-item" id="se-rename">シリーズ名を変更…</button>
    <button class="series-edit-item" id="se-add">本を追加…</button>
    <button class="series-edit-item" id="se-remove">本をはずす…</button>
    <button class="series-edit-item danger" id="se-dissolve">シリーズを解散（本は消えません）</button>
    <button id="btn-series-edit-close">閉じる</button>
  </div>
</div>

<!-- 並び替えシート -->
<div id="sort-panel" class="hidden">
  <div id="sort-inner">
    <strong>並び替え</strong>
    <button class="sort-item" data-sort="recent">最終閲覧順<small>最近読んだ本が上。読むたび自動で並びます</small></button>
    <button class="sort-item" data-sort="added">追加順<small>本棚に入れた順（新しい順）</small></button>
    <button class="sort-item" data-sort="title">タイトル順<small>#1, #2… のシリーズが番号順に並びます</small></button>
    <small id="sort-state"></small>
    <button id="btn-sort-close">閉じる</button>
  </div>
</div>

<!-- 保存トースト -->
<div id="toast"></div>

<!-- 貼り付け取り込みパネル -->
<div id="paste-panel" class="hidden">
  <div id="paste-inner">
    <strong>テキスト貼り付けで追加</strong>
    <input type="text" id="paste-title" placeholder="タイトル（省略時は1行目）">
    <textarea id="paste-text" placeholder="本文をここに貼り付け"></textarea>
    <div class="paste-actions">
      <button id="btn-paste-cancel">やめる</button>
      <button id="btn-paste-import">取り込む</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".txt,.md,.markdown,.text,.noovel,.pdf,.webarchive,application/pdf,application/x-webarchive" style="display:none">
<input type="file" id="backup-input" accept=".json,application/json" style="display:none">

<script src="./js/version.js"></script>
<script src="./js/convert.js"></script>
<script src="./js/webarchive.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
