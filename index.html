<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Noovel">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Noovel</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div id="app">

  <header id="header">
    <button id="btn-left" data-mode="open">開く</button>
    <h1 id="header-title">Noovel</h1>
    <button id="btn-settings" aria-label="設定">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <div id="progress"><div id="progress-bar"></div></div>

  <div id="reader-wrap">
    <div id="shelf">
      <button id="resume-bar" class="hidden"></button>
      <div id="shelf-empty">
        <p>📖</p>
        <p>「開く」からテキストファイルを<br>読み込んでください</p>
      </div>
      <div id="shelf-list"></div>
      <button id="btn-paste-open">＋ 貼り付けで追加</button>
      <div id="shelf-version" class="version-note"></div>
    </div>
    <div id="reader"></div>
    <div id="press-menu" class="hidden">
      <button id="pm-marker">マーカー</button>
      <button id="pm-bookmark">しおり</button>
    </div>
  </div>

  <div id="chapter-nav" class="hidden">
    <button id="btn-prev-ch" disabled>‹</button>
    <button id="chapter-nav-info" aria-label="目次を開く">
      <div id="ch-title-nav"></div>
      <div id="ch-counter"></div>
    </button>
    <button id="btn-next-ch" disabled>›</button>
  </div>

</div>

<!-- 設定パネル -->
<div id="settings-panel" class="hidden">
  <div id="settings-inner">
    <strong>表示設定</strong>

    <div>
      <div class="panel-label">テーマ</div>
      <div class="themes">
        <button class="theme-btn" data-theme="warm">温白</button>
        <button class="theme-btn" data-theme="white">白</button>
        <button class="theme-btn" data-theme="sepia">セピア</button>
        <button class="theme-btn" data-theme="dark">ダーク</button>
      </div>
    </div>

    <div class="setting-row">
      <label>文字サイズ <span id="val-font-size">18</span>px</label>
      <input type="range" id="range-font-size" min="12" max="32" step="1" value="18">
    </div>

    <div class="setting-row">
      <label>行間 <span id="val-line-height">2.0</span></label>
      <input type="range" id="range-line-height" min="1.2" max="3.0" step="0.1" value="2.0">
    </div>

    <div class="setting-row">
      <label>フォント</label>
      <select id="sel-font">
        <option value="serif">明朝体</option>
        <option value="gothic">ゴシック体</option>
        <option value="rounded">丸ゴシック</option>
      </select>
    </div>

    <div class="setting-row">
      <label>背景色</label>
      <input type="color" id="pick-bg" value="#f5f0e8">
    </div>
    <div class="setting-row">
      <label>文字色</label>
      <input type="color" id="pick-text" value="#333333">
    </div>

    <div class="toggle-row">
      <label>縦書き</label>
      <label class="switch">
        <input type="checkbox" id="tog-vertical">
        <span class="slider"></span>
      </label>
    </div>

    <div>
      <div class="panel-label">データ</div>
      <div class="backup-row">
        <button id="btn-backup-export">本棚を書き出す</button>
        <button id="btn-backup-import">バックアップを読み込む</button>
      </div>
      <div class="backup-note">書き出したファイルは「ファイル」appに保存されます。月イチ推奨</div>
    </div>

    <button id="btn-close-settings">閉じる</button>
    <div id="app-version" class="version-note"></div>
  </div>
</div>

<!-- 目次パネル -->
<div id="toc-panel" class="hidden">
  <div id="toc-inner">
    <div id="toc-header">
      <strong id="toc-book-title"></strong>
      <button id="btn-close-toc">✕</button>
    </div>
    <div id="toc-tabs">
      <button class="toc-tab active" data-tab="toc">目次</button>
      <button class="toc-tab" data-tab="bm">しおり</button>
      <button class="toc-tab" data-tab="mk">マーカー</button>
    </div>
    <div id="toc-list"></div>
    <button id="btn-to-shelf">‹ 本棚へ戻る</button>
  </div>
</div>

<!-- 貼り付け取り込みパネル -->
<div id="paste-panel" class="hidden">
  <div id="paste-inner">
    <strong>テキスト貼り付けで追加</strong>
    <input type="text" id="paste-title" placeholder="タイトル（省略時は1行目）">
    <textarea id="paste-text" placeholder="本文をここに貼り付け"></textarea>
    <div class="paste-actions">
      <button id="btn-paste-cancel">やめる</button>
      <button id="btn-paste-import">取り込む</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".txt,.md,.markdown,.text,.noovel,.pdf,application/pdf" style="display:none">
<input type="file" id="backup-input" accept=".json,application/json" style="display:none">

<script src="./js/version.js"></script>
<script src="./js/convert.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
